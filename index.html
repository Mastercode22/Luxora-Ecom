<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />

    <script>
      // Disable two-finger touch gestures (pinch-zoom & multi-finger panning/scrolling)
      document.addEventListener('touchstart', function (e) {
        if (e.touches && e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      document.addEventListener('touchmove', function (e) {
        if (e.touches && e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });

      // Disable iOS Safari gesture zoom
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('gesturechange', function (e) {
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('gestureend', function (e) {
        e.preventDefault();
      }, { passive: false });
    </script>

    <title>Luxora Gifts — Luxury Flowers, Hampers & Gifting</title>
    <meta
      name="description"
      content="Luxora Gifts curates premium flowers, hampers, jewelry and keepsakes for birthdays, weddings and corporate gifting, delivered same-day across Ghana."
    />
    <meta name="theme-color" content="#E91E63" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Luxora Gifts — Luxury Flowers, Hampers & Gifting" />
    <meta
      property="og:description"
      content="Premium, hand-finished flowers, hampers and keepsakes for every occasion."
    />
    <meta property="og:site_name" content="Luxora Gifts" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Luxora Gifts — Luxury Flowers, Hampers & Gifting" />
    <meta
      name="twitter:description"
      content="Premium, hand-finished flowers, hampers and keepsakes for every occasion."
    />
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
